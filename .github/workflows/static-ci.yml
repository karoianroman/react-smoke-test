name: 🌐 Static React App CI

on:
  push:
    branches: [ main ]

jobs:
  smoke-test-build:
    name: 🧪 Перевірка збірки фронтенду
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Отримання коду
        uses: actions/checkout@v4

      - name: 🟢 Налаштування Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Встановлення бібліотек
        run: npm ci

      - name: 🏗️ Процес збірки (React Build)
        run: npm run build

      - name: 🔍 Перевірка файлу index.html
        run: |
          if [ -f "dist/index.html" ]; then
            echo "✅ Smoke test успішний!"
          else
            echo "❌ Помилка: index.html не знайдено!"
            exit 1
          fi