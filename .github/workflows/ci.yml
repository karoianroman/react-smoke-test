name: 🚀 Deploy to Google Cloud Run

'on':
  push:
    branches:
      - main
      - master

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Додай у GitHub Secrets
  REGION: europe-west1 # Обирай ближчий до тебе регіон
  SERVICE_NAME: react-app # Назва сервісу в Cloud Run
  REPOSITORY: react-repo # Назва репозиторію в Artifact Registry

permissions:
  contents: read    # Дозволяє зчитувати код репозиторію
  id-token: write   # ЦЕ НАЙВАЖЛИВІШЕ: дозволяє GitHub генерувати токен для Google Cloud

jobs:
  deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 1. Авторизація в Google Cloud
      # Рекомендую використовувати Workload Identity Federation (це безпечніше)
      # Але для початку можна використати JSON ключ сервісного акаунта в секретах
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          #credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Скопіюй цей шлях зі сторінки провайдера в GCP
          workload_identity_provider: 'projects/992838171690/locations/global/workloadIdentityPools/github-actions-pool/providers/react-smoke-test'
          service_account: 'github-actions-sa@repo-490410.iam.gserviceaccount.com'

      - name: ⚙️ Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 2. Налаштування Docker для Artifact Registry
      - name: 🐳 Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
             
      # Test
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      # 4. Збірка Docker-образу та Push у Google Artifact Registry
      - name: 📤 Build and Push Container
        run: |
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      # 5. Деплой у Google Cloud Run
      - name: 🚀 Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY
            }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated' # Робить сайт публічним

      - name: 🔥 Smoke test
  run: |
    URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
      --region=${{ env.REGION }} \
      --format='value(status.url)')
    echo "Testing: $URL"
    curl -f --retry 5 --retry-delay 3 "$URL"